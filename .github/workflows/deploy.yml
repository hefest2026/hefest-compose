name: Deploy

# Runs after CI succeeds on main (i.e. once a PR is merged). Updates the compose
# checkout on the host and brings up the staging stack. This is what keeps the
# host's compose files in sync — the hefest-api deploy only updates the API repo.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Never run two staging deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    # Only deploy when the triggering CI run was green.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - name: Pull latest compose and bring up the staging stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          # COMPOSE_FILE makes every `docker compose` call use the staging stack
          # (Traefik on :8067, Postgres/Redis not exposed). The host's .env is
          # gitignored, so `git reset --hard` leaves it untouched.
          script: |
            set -euo pipefail
            export COMPOSE_FILE=compose.staging.yml
            cd /opt/hefest/hefest-compose
            git fetch --prune origin
            git reset --hard origin/main
            docker compose up -d --build
            docker compose ps
            docker image prune -f
