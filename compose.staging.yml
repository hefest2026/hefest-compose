services:
  traefik:
    image: traefik:v3.6  # Upgraded from v3.3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:8067
    ports:
      - "8067:8067"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hefest
      POSTGRES_PASSWORD: ${HEFEST_DB_PASSWORD:-hefest}
      POSTGRES_DB: hefest_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping — Postgres is reachable only on the compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hefest -d hefest_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No host port mapping — internal only.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Mail catcher for staging: the worker delivers verification / registration
  # emails here over SMTP (1025) instead of a real provider, and the captured
  # mail is browsable through Traefik at /mailpit. MP_WEBROOT makes mailpit
  # serve its UI and API under that prefix so no StripPrefix is needed.
  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_WEBROOT: mailpit
    # axllent/mailpit is a minimal Go binary image without wget/curl/sh, so an
    # in-container HTTP healthcheck is not reliably available; consumers gate on
    # service_started.
    labels:
      - traefik.enable=true
      - traefik.http.routers.hefest-mailpit.rule=PathPrefix(`/mailpit`)
      - traefik.http.routers.hefest-mailpit.entrypoints=web
      - traefik.http.routers.hefest-mailpit.priority=100
      - traefik.http.services.hefest-mailpit.loadbalancer.server.port=8025
    restart: unless-stopped

  api:
    build:
      context: ../hefest-api
      dockerfile: Dockerfile.prod
    env_file:
      - .env
      - path: .env.sso
        required: false
    environment:
      HEFEST_DB_URL: asyncpg://hefest:${HEFEST_DB_PASSWORD:-hefest}@postgres:5432/hefest_db
      HEFEST_REDIS_URL: redis://redis:6379
      # Verification emails deep-link into the mobile app instead of the web
      # frontend, so the link opens hefest-mobile's verify-email route on a
      # phone. The API appends ?token=<jwt>. (HEF-41 staging-email dependency.)
      HEFEST_EMAIL_VERIFY_URL: hefestmobile://verify-email
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.hefest-api.rule=PathPrefix(`/`)
      - traefik.http.routers.hefest-api.entrypoints=web
      - traefik.http.services.hefest-api.loadbalancer.server.port=8000
    # No host port — traffic reaches the API only through Traefik.
    # CMD (uvicorn, no --reload) comes from Dockerfile.prod.
    restart: unless-stopped

  # Notification delivery worker — drains the notification_jobs outbox and
  # sends email via mailpit. Without it, every enqueued job (email verification,
  # registration/waitlist/promotion notices) would sit `pending` forever.
  worker:
    build:
      context: ../hefest-api
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      HEFEST_DB_URL: asyncpg://hefest:${HEFEST_DB_PASSWORD:-hefest}@postgres:5432/hefest_db
      HEFEST_SMTP_HOST: mailpit
      HEFEST_SMTP_PORT: "1025"
      HEFEST_SMTP_USE_TLS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      # Gate on the API (not a migrate service — there isn't one here): the
      # shared entrypoint migrates on startup, and waiting for the API to be
      # healthy means migrations are already applied, so the worker's own
      # entrypoint migrate is a harmless no-op rather than a concurrent race.
      api:
        condition: service_healthy
    # ENTRYPOINT (docker-entrypoint.sh) runs migrations, then execs this command.
    command: ["uv", "run", "python", "-m", "hefest.worker"]
    restart: unless-stopped

  frontend:
    build:
      context: ../hefest-frontend
      dockerfile: Dockerfile
    healthcheck:
      # 127.0.0.1 (not localhost): the image has no IPv6 listener, and localhost
      # resolves to ::1 first inside the container -> connection refused -> the
      # container is marked unhealthy -> Traefik drops the route.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/hefest-frontend/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      # Higher priority than the API's catch-all PathPrefix(`/`) so /hefest-frontend
      # is served by nginx while everything else still reaches the API.
      - traefik.http.routers.hefest-frontend.rule=PathPrefix(`/hefest-frontend`)
      - traefik.http.routers.hefest-frontend.entrypoints=web
      - traefik.http.routers.hefest-frontend.priority=100
      - traefik.http.services.hefest-frontend.loadbalancer.server.port=80
    # No host port — traffic reaches the SPA only through Traefik.
    restart: unless-stopped

volumes:
  postgres_data:
